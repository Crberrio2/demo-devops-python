name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11.3'

jobs:
  test:
    name: Build, Test, Static Analysis & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 .

      - name: Static security analysis (bandit)
        run: bandit -r api demo -ll

      - name: Run unit tests with coverage
        env:
          DJANGO_SECRET_KEY: test-secret-key
          DJANGO_DEBUG: 'False'
        run: |
          coverage run manage.py test
          coverage report
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-and-push:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: scan-target:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability scan (Trivy)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.51.1 image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            scan-target:latest

      - name: Push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes (kind)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci
          config: .github/kind-config.yaml

      - name: Install NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=300s

      - name: Build and load image into kind
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/demo-devops-python:latest
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t "$IMAGE" .
          kind load docker-image "$IMAGE" --name ci

      - name: Deploy manifests
        run: kubectl apply -k k8s/

      - name: Wait for rollout
        run: kubectl -n demo-devops rollout status deployment/demo-devops-python --timeout=180s

      - name: Show deployed resources
        run: |
          kubectl -n demo-devops get all,ingress,hpa,configmap,secret,pvc

      - name: Smoke test via Service (port-forward)
        run: |
          kubectl -n demo-devops port-forward svc/demo-devops-python 8080:80 &
          sleep 8
          curl -fsS http://localhost:8080/api/health/live/
          curl -fsS http://localhost:8080/api/users/

      - name: Smoke test via Ingress
        run: |
          kubectl -n demo-devops wait --for=condition=available deployment/demo-devops-python --timeout=120s
          for i in $(seq 1 10); do
            if curl -fsS -H "Host: demo-devops.local" http://localhost/api/health/live/; then
              echo "ingress OK"; exit 0
            fi
            echo "retry $i..."; sleep 6
          done
          echo "ingress not reachable"; exit 1
